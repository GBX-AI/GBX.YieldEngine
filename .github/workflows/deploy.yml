name: Deploy Yield Engine

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  BACKEND_IMAGE: ghcr.io/gbx-ai/yieldengine-backend
  FRONTEND_IMAGE: ghcr.io/gbx-ai/yieldengine-frontend
  RESOURCE_GROUP: YieldEngine
  BACKEND_APP: yield-engine-api
  FRONTEND_APP: yield-engine-web

permissions:
  contents: read
  packages: write

jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          build-args: |
            VITE_API_BASE=${{ secrets.BACKEND_FQDN && format('https://{0}', secrets.BACKEND_FQDN) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    steps:
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set GHCR registry on backend
        uses: azure/cli@v2
        with:
          inlineScript: |
            az containerapp registry set \
              --name ${{ env.BACKEND_APP }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --server ghcr.io \
              --username gbx-ai \
              --password "${{ secrets.GHCR_PAT }}"

      - name: Deploy backend
        uses: azure/cli@v2
        with:
          inlineScript: |
            az containerapp update \
              --name ${{ env.BACKEND_APP }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --image ${{ env.BACKEND_IMAGE }}:${{ github.sha }}

      - name: Set GHCR registry on frontend
        uses: azure/cli@v2
        with:
          inlineScript: |
            az containerapp registry set \
              --name ${{ env.FRONTEND_APP }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --server ghcr.io \
              --username gbx-ai \
              --password "${{ secrets.GHCR_PAT }}"

      - name: Deploy frontend
        uses: azure/cli@v2
        with:
          inlineScript: |
            az containerapp update \
              --name ${{ env.FRONTEND_APP }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --image ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
