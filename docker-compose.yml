version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: yield-engine-api
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=Development
      - PORT=8000
    volumes:
      - ./backend/data:/app/data

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: http://localhost:8000
    container_name: yield-engine-web
    ports:
      - "3000:3000"
    depends_on:
      - backend
